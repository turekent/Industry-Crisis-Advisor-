<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 产业避险参谋长</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 头部介绍区域 */
        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #2d3748;
            font-size: 32px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1::before {
            content: "🛡️";
            font-size: 40px;
        }

        .header .subtitle {
            color: #718096;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .header .industries {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .industry-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        /* 主内容区域 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* 新闻滚动区域 */
        .news-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .news-section h2 {
            color: #2d3748;
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .news-section h2::before {
            content: "📰";
            font-size: 28px;
        }

        .news-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .news-item {
            border-bottom: 1px solid #e2e8f0;
            padding: 15px 0;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .news-title {
            color: #2d3748;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .news-title:hover {
            color: #667eea;
        }

        .news-meta {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: #a0aec0;
            margin-bottom: 8px;
        }

        .news-snippet {
            color: #718096;
            font-size: 14px;
            line-height: 1.5;
        }

        .news-type {
            display: inline-block;
            background: #edf2f7;
            color: #4a5568;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }

        /* 查询区域 */
        .query-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .query-section h2 {
            color: #2d3748;
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .query-section h2::before {
            content: "🔍";
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            color: #4a5568;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-group select:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-group textarea {
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 结果显示区域 */
        .result-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: none;
        }

        .result-section.active {
            display: block;
        }

        .result-section h2 {
            color: #2d3748;
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-section h2::before {
            content: "📊";
            font-size: 28px;
        }

        .result-content {
            background: #f7fafc;
            border-radius: 8px;
            padding: 20px;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            color: #2d3748;
            max-height: 600px;
            overflow-y: auto;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #718096;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .error {
            color: #e53e3e;
            background: #fff5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        /* 刷新按钮 */
        .refresh-btn {
            background: #edf2f7;
            color: #4a5568;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 15px;
        }

        .refresh-btn:hover {
            background: #e2e8f0;
        }

        /* 时间戳 */
        .timestamp {
            color: #a0aec0;
            font-size: 12px;
            margin-bottom: 15px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 24px;
            }

            .industry-tag {
                font-size: 12px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部介绍区域 -->
        <div class="header">
            <h1>2026 产业避险参谋长</h1>
            <div class="subtitle">
                针对六大行业提供基于战争实时动态的成本预警和采购建议。运用费曼技巧，将复杂的国际局势转化成老板听得懂的"盈亏账"。
                实时监控原材料价格波动、物流延误情况，为您快速做出准确的采购和定价决策提供支持。
            </div>
            <div class="industries">
                <span class="industry-tag">🏭 PCB</span>
                <span class="industry-tag">🛥️ 游艇</span>
                <span class="industry-tag">💊 生物医药</span>
                <span class="industry-tag">🔋 新型储能</span>
                <span class="industry-tag">🖨️ 打印耗材</span>
                <span class="industry-tag">📦 跨境电商</span>
            </div>
        </div>

        <!-- 主内容区域 -->
        <div class="main-content">
            <!-- 新闻滚动区域 -->
            <div class="news-section">
                <h2>实时市场动态</h2>
                <button class="refresh-btn" onclick="loadMarketNews()">
                    🔄 刷新最新资讯
                </button>
                <div class="timestamp" id="newsTimestamp">更新时间：加载中...</div>
                <div class="news-list" id="newsList">
                    <div class="loading">正在加载最新资讯</div>
                </div>
            </div>

            <!-- 查询区域 -->
            <div class="query-section">
                <h2>行业风险查询</h2>
                <div class="input-group">
                    <label>选择行业</label>
                    <select id="industrySelect">
                        <option value="">请选择行业</option>
                        <option value="PCB">PCB - 印刷电路板</option>
                        <option value="游艇">游艇 - 游艇制造</option>
                        <option value="生物医药">生物医药 - 生物医药</option>
                        <option value="新型储能">新型储能 - 新型储能</option>
                        <option value="打印耗材">打印耗材 - 打印耗材</option>
                        <option value="跨境电商">跨境电商 - 跨境电商</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>详细需求（可选）</label>
                    <textarea id="queryDetail" placeholder="输入您的具体需求或问题，例如：关注原材料价格走势、物流延误情况等..."></textarea>
                </div>
                <button class="btn" id="queryBtn" onclick="queryIndustry()">
                    开始分析
                </button>
                <div id="error" class="error" style="display: none;"></div>
            </div>
        </div>

        <!-- 结果显示区域 -->
        <div class="result-section" id="resultSection">
            <h2>风险分析报告</h2>
            <div class="result-content" id="resultContent">
                <!-- 结果将在这里显示 -->
            </div>
        </div>
    </div>

    <script>
        // API基础URL
        const API_BASE_URL = window.location.origin;

        // 页面加载时自动获取新闻
        window.addEventListener('load', function() {
            loadMarketNews();
        });

        // 加载市场新闻
        async function loadMarketNews() {
            const newsList = document.getElementById('newsList');
            const timestampEl = document.getElementById('newsTimestamp');
            
            newsList.innerHTML = '<div class="loading">正在加载最新资讯</div>';
            
            try {
                const response = await fetch(`${API_BASE_URL}/market_news`);
                const data = await response.json();
                
                if (data.success && data.news && data.news.length > 0) {
                    timestampEl.textContent = `更新时间：${data.timestamp}`;
                    
                    newsList.innerHTML = data.news.map((item, index) => `
                        <div class="news-item" style="animation-delay: ${index * 0.1}s">
                            <div class="news-title" onclick="window.open('${item.url}', '_blank')">
                                ${item.title}
                            </div>
                            <div class="news-meta">
                                <span class="news-type">${item.type}</span>
                                <span>📍 ${item.source}</span>
                                <span>🕐 ${item.publish_time}</span>
                            </div>
                            <div class="news-snippet">${item.snippet}</div>
                        </div>
                    `).join('');
                } else {
                    newsList.innerHTML = '<div style="text-align: center; color: #718096; padding: 40px;">暂无最新资讯</div>';
                }
            } catch (error) {
                console.error('加载新闻失败:', error);
                newsList.innerHTML = `<div class="error">加载失败: ${error.message}<br><br>请检查网络连接或刷新页面重试</div>`;
            }
        }

        // 查询行业风险
        async function queryIndustry() {
            const industry = document.getElementById('industrySelect').value;
            const detail = document.getElementById('queryDetail').value;
            const queryBtn = document.getElementById('queryBtn');
            const resultSection = document.getElementById('resultSection');
            const resultContent = document.getElementById('resultContent');
            const errorEl = document.getElementById('error');
            
            // 验证输入
            if (!industry) {
                errorEl.textContent = '请选择要查询的行业';
                errorEl.style.display = 'block';
                return;
            }
            
            errorEl.style.display = 'none';
            queryBtn.disabled = true;
            queryBtn.textContent = '正在分析...';
            resultSection.classList.add('active');
            resultContent.textContent = '正在调用 AI 分析行业风险，请稍候...';
            
            try {
                const response = await fetch(`${API_BASE_URL}/stream_run`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        type: 'query',
                        session_id: 'web_' + Date.now(),
                        message: industry,
                        content: {
                            query: {
                                prompt: [
                                    {
                                        type: 'text',
                                        content: {
                                            text: detail ? `${industry}，${detail}` : industry
                                        }
                                    }
                                ]
                            }
                        }
                    })
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const jsonStr = line.substring(6);
                                const data = JSON.parse(jsonStr);
                                
                                if (data.type === 'text' && data.content) {
                                    fullContent += data.content;
                                    resultContent.textContent = fullContent;
                                }
                            } catch (e) {
                                // 忽略解析错误
                            }
                        }
                    }
                }
                
                queryBtn.disabled = false;
                queryBtn.textContent = '开始分析';
                
            } catch (error) {
                console.error('查询失败:', error);
                errorEl.textContent = `查询失败: ${error.message}`;
                errorEl.style.display = 'block';
                queryBtn.disabled = false;
                queryBtn.textContent = '开始分析';
            }
        }

        // 回车键提交
        document.getElementById('queryDetail').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                queryIndustry();
            }
        });
    </script>
</body>
</html>
